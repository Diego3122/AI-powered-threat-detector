global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'threat-detector'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'model-server'
    static_configs:
      - targets: ['model-server:8001']
    metrics_path: '/metrics'
    scrape_interval: 5s
